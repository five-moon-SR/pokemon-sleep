# 食材期待値キャリブレーション
#
# utils/food_expectation.py の出力を、ネット上の既存ツールの計算結果と突き合わせる。
# 評価器の「だいふく評価キャリブレーション」と同じ運用パターン。
#
# 使い方:
#   1. _meta.source_tool に既存ツールの名前/URLを書く
#   2. _meta.play_context_* を既存ツールに入力するプレイヤー設定と一致させる
#      （平日睡眠時間・休日睡眠時間・RR）
#   3. ケースごとに [[case]] ブロックを追加
#      - 既存ツールに同じ条件（種族・Lv・性格・サブスキル・食材枠・リボン段階）を入力
#      - 既存ツールの出力（食材名→1日 or 1週の獲得個数）を expected_ingredients に書く
#   4. 検算: python -m scripts.calibrate_food_expectation
#
# サブスキル名は constants.py の正規表記に揃える:
#   おてつだいスピードS / おてつだいスピードM / おてつだいボーナス
#   食材確率アップS / 食材確率アップM
#   スキル確率アップS / スキル確率アップM
#   スキルレベルアップS / スキルレベルアップM
#   きのみの数S / げんき回復ボーナス / 睡眠EXPボーナス / リサーチEXPボーナス
#   ゆめのかけらボーナス
#   最大所持数アップS / 最大所持数アップM / 最大所持数アップL
#
# 食材名は data/ingredient.json の name と完全一致させる（例: "とくせんリンゴ"）

# ─────────────────────────────────────────────────────────────
[_meta]
source_tool = "だいふく 期待値チェッカー https://www.pokemonsleepdaifuku.com/checker/expected/"
acquired_at = "2026-05-08"
note = "v0.2 ベースキャリブレーション。リザードン中心＋プクリン1ケース。daifukuは24h前提・げんき変動加味モデル。"
# 既存ツールに揃えるプレイヤー設定。同名キーが PlayContext を上書きする。
play_context_research_rank = 65
play_context_pot_capacity = 69
play_context_sleep_weekday_hours = 7.5     # v0.2 以降は使用しない（DAILY_EFFECTIVE_ASSIST_SECONDS でげんき変動を一括加味）
play_context_sleep_weekend_hours = 9.0

# ─────────────────────────────────────────────────────────────
# ケーステンプレ（コピーして使う）
# ─────────────────────────────────────────────────────────────
# [[case]]
# id = "001"
# species_name = "グレッグル"        # data/pokemon_master.json の name
# nickname = ""                       # 任意、表示用
# level = 15                          # current_level 相当
# nature = "まじめ"                   # data/nature.json の name、無補正性格でも明示
# subskills = []                      # 例: ["おてつだいスピードS", "食材確率アップM"]
# ingredient_1 = "シアーノオイル"     # 個体の食材枠1（a枠から選択）
# ingredient_2 = ""                   # Lv30未開放なら空文字
# ingredient_3 = ""                   # Lv60未開放なら空文字
# ribbon_stage = 0                    # 0=なし、1〜4
# expected_unit = "per_day"           # "per_day" | "per_week"
# expected_weekend = false            # 平日想定なら false、休日想定なら true
# expected_ingredients = { "シアーノオイル" = 7.0 }
# note = ""
#
# 同じ個体で複数の条件（平日/休日、リボン段階違いなど）を測りたい場合は
# id を変えて複数ケースとして登録する。

# ─────────────────────────────────────────────────────────────
# 実ケース（ここに追加していく）
# ─────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────
# case 001: リザードン Lv60 サブスキルなし 性格きまぐれ（無補正）
# ─────────────────────────────────────────────────────────────
# 既存ツール出力（生）:
#   スキル名: 食材ゲットS / スキル効果 11個 / スキル発動回数 1.01回 / スキル効果合計 11個
#   きのみエナジー 11377.78 / 合計食材数 66 / 第一9.4 / 第二23.6 / 第三33
#   メインスキルLv 3 / 最大所持数 29 / 好みのきのみ ON / EXモード OFF
#   フィールドボーナス OFF / キャンプチケット OFF
[[case]]
id = "001"
species_name = "リザードン"
nickname = ""
level = 60
nature = "きまぐれ"
subskills = []
# 既存ツール側で「AAA」入力 = 3枠ともマメミートを選択
ingredient_1 = "マメミート"
ingredient_2 = "マメミート"
ingredient_3 = "マメミート"
ribbon_stage = 0
expected_unit = "per_day"
expected_weekend = false
# 既存ツール出力 第一9.4 + 第二23.6 + 第三33 = 66 を全部マメミートとして合算
expected_ingredients = { "マメミート" = 66.0 }
expected_skill_activations = 1.01    # 1日のスキル発動回数（参考記録、現状未使用）
expected_skill_effect = "11個"        # スキル1回あたりの効果（参考記録）
expected_berry_energy = 11377.78      # 1日のきのみエナジー（参考記録）
note = "AAA編成（3枠ともマメミート）。メインスキルLv3、内訳9.4/23.6/33、合計66、きのみエナジー11377.78"

# =============================================================================
# 第2弾（2026-05-08）: 補正係数とげんき周りの検証
#
# 取得依頼内容:
#   下記 case 002〜012 の条件を https://www.pokemonsleepdaifuku.com/checker/expected/
#   に入力し、出力（合計食材数・第一/第二/第三食材・スキル発動回数・きのみエナジー）を
#   各 [[case]] 内の expected_* フィールドに転記する。
#
#   入力時の固定設定:
#     - メインスキルLv: case 002〜008, 011, 012 はリザードン → 食材ゲットS Lv 3（case 001 と同じ）
#     - メインスキルLv: case 009, 010 はプクリン → げんきオールS Lv 6 (max)
#     - 進化回数: 0
#     - おてつだいボーナス持ちチーム数: 0
#     - 好みのきのみ: ON
#     - EXモード: OFF
#     - キャンプチケット: OFF
#     - フィールドボーナス: 0%
#     - げんき回復スキル/げんき補正オプション: OFF（自身げんき回復ループは daifuku デフォルトに任せる）
#
#   各ケースのリザードン編成は基本「AAA」（3枠ともマメミート）。E群（case 012）だけ ABC。
#
# A群: サブスキル単独装着（リザードン Lv60 性格まじめ AAA） — 補正係数の検証
# B群: 性格補正（リザードン Lv60 サブなし AAA）
# C群: げんき回復系メインスキル持ち（プクリン Lv60）— げんきループ補正の検証
# D群: おやすみリボン段階4（リザードン Lv60 サブなし AAA）
# E群: 食材枠 ABC編成（リザードン Lv60 サブなし）
# =============================================================================


