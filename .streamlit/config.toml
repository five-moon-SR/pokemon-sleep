# ポケスリ管理ツール テーマ「本家準拠」
# 実機スクショ(貼り付けデータ集/画像集/アプリUI/)からの実測パレット。
# メニュー画面は白ベース+カテゴリ色バナー+緑の決定ボタンが本家の骨格。

[theme]
base = "light"
primaryColor = "#23D76B"            # 本家の決定/主ボタン緑(実測)
backgroundColor = "#FFFFFF"         # メニュー画面は白ベース
secondaryBackgroundColor = "#F6F6F6" # 入力/ピル面(下部バーの白ピル系)
textColor = "#3F3F3F"               # 本文チャコール
linkColor = "#1C629E"               # 数値・リンクの濃青
borderColor = "#E5E5E5"
baseRadius = "16px"
buttonRadius = "full"

[theme.sidebar]
backgroundColor = "#FAF7EC"         # ナビはうっすらクリームで主従を付ける
