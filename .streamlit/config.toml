# ポケスリ管理ツール テーマ「ひなたのリサーチノート」（ゲーム内UI寄せ）
# ポケスリ本体の クリーム地 × 白カード × スリープブルー × 丸ゴ の雰囲気。
# 標準ウィジェットの色はすべてここで指定する（CSSで input/selectbox を殴らない）。
# 自作コンポーネントのCSSトークンは ui/theme.py 側（--ps-* 変数）。

[theme]
base = "light"
primaryColor = "#35A7CC"            # スリープブルー: ボタン・選択状態・リンク
backgroundColor = "#FBF3E4"         # クリーム地（ゲームのメニュー背景）
secondaryBackgroundColor = "#FFFFFF" # カード面・入力面
textColor = "#3B4460"               # ネイビー文字
linkColor = "#35A7CC"
borderColor = "#EADFC8"
baseRadius = "16px"
buttonRadius = "full"

[theme.sidebar]
backgroundColor = "#F3EAD6"         # ナビは一段濃いクリームで主従を付ける
